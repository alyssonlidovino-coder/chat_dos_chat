<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A Praça - Premium</title>
    <style>
        /* --- ESTILOS MODERNOS --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fafafa; margin: 0; height: 100svh; display: flex; justify-content: center; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: #fff; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        /* CABEÇALHOS */
        .header { background: #fff; border-bottom: 1px solid #dbdbdb; padding: 15px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; }
        .btn-back { border: none; background: none; font-size: 20px; cursor: pointer; padding: 0 10px; }

        /* TELAS */
        .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* LISTA DE CONTATOS */
        .user-item { padding: 15px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.2s; }
        .user-item:active { background: #fafafa; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
        .status-online { background: #47dc31; box-shadow: 0 0 5px #47dc31; }

        /* CHAT */
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #fff; }
        .bubble { padding: 8px 12px; border-radius: 18px; font-size: 14px; max-width: 80%; line-height: 1.4; position: relative; }
        .msg-me { align-self: flex-end; background: #3797f0; color: #fff; }
        .msg-others { align-self: flex-start; background: #efefef; color: #262626; }
        .info-meta { font-size: 9px; opacity: 0.7; margin-top: 4px; text-align: right; }
        
        /* DIGITANDO */
        #typing-indicator { height: 20px; padding: 0 15px; font-size: 11px; color: #8e8e8e; }

        /* LOGIN */
        #login-screen { padding: 40px 20px; align-items: center; justify-content: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 5px; background: #fafafa; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 5px; background: #0095f6; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen">
        <h2 style="font-family: 'Arial Black'; color: #262626;">A PRAÇA</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="password" id="pass" placeholder="Senha" maxlength="4">
        <button class="btn-main" id="btn-entrar" onclick="entrar()">ENTRAR</button>
        <p id="status-msg" style="font-size: 12px; color: #8e8e8e; height: 15px;"></p>
        <button onclick="cadastrar()" style="border:none; background:none; color:#0095f6; margin-top:15px; font-size:12px;">Criar nova conta</button>
    </div>

    <div id="list-screen" class="screen" style="display:none">
        <div class="header">
            <span>Conversas</span>
            <span style="font-size:12px; color:#ed4956" onclick="location.reload()">Sair</span>
        </div>
        <div id="user-list" style="overflow-y:auto"></div>
    </div>

    <div id="chat-screen" class="screen" style="display:none">
        <div class="header">
            <button class="btn-back" onclick="voltarParaLista()">‹</button>
            <span id="chat-title">Nome</span>
            <div style="width:40px"></div>
        </div>
        <div id="msgs"></div>
        <div id="typing-indicator"></div>
        <div style="padding: 10px; display: flex; gap: 8px; border-top: 1px solid #efefef;">
            <input type="text" id="msg-input" placeholder="Mensagem..." style="margin:0; border-radius:20px;">
            <button onclick="enviar()" style="border:none; background:none; color:#0095f6; font-weight:bold;">Enviar</button>
        </div>
    </div>
</div>

<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio> <audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio> <audio id="snd-send" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio> <audio id="snd-typing" src="https://assets.mixkit.co/active_storage/sfx/1103/1103-preview.mp3"></audio> <script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec"; // COLOQUE O LINK DA NOVA IMPLANTAÇÃO
    let meuNome = "";
    let ultimaQtd = 0;
    let loopChat, loopLista;

    function playSnd(id) { document.getElementById(id).play().catch(()=>{}); }

    async function entrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(!u || !s) return;
        
        playSnd('snd-click');
        document.getElementById('status-msg').innerText = "conectando...";
        
        try {
            const res = await fetch(`${URL_SCRIPT}?acao=login&u=${encodeURIComponent(u)}&s=${encodeURIComponent(s)}`);
            if(await res.text() === "ok") {
                meuNome = u.toLowerCase();
                localStorage.setItem('p_user_nome', u);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('list-screen').style.display = 'flex';
                atualizarLista();
                loopLista = setInterval(atualizarLista, 5000);
            } else {
                alert("Erro no login");
                document.getElementById('status-msg').innerText = "";
            }
        } catch(e) { document.getElementById('status-msg').innerText = "Erro de conexão"; }
    }

    async function atualizarLista() {
        const res = await fetch(`${URL_SCRIPT}?acao=get_users`);
        const users = await res.json();
        const container = document.getElementById('user-list');
        container.innerHTML = users.map(u => {
            if(u.nome.toLowerCase() === meuNome) return '';
            return `
                <div class="user-item" onclick="abrirChat('${u.nome}')">
                    <span>${u.nome}</span>
                    <div class="status-dot ${u.status === 'online' ? 'status-online' : ''}"></div>
                </div>`;
        }).join('');
    }

    function abrirChat(nome) {
        playSnd('snd-click');
        clearInterval(loopLista);
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-title').innerText = nome;
        carregarMensagens();
        loopChat = setInterval(carregarMensagens, 3000);
    }

    function voltarParaLista() {
        playSnd('snd-click');
        clearInterval(loopChat);
        document.getElementById('chat-screen').style.display = 'none';
        document.getElementById('list-screen').style.display = 'flex';
        loopLista = setInterval(atualizarLista, 5000);
    }

    async function carregarMensagens() {
        const res = await fetch(URL_SCRIPT);
        const mensagens = await res.json(); // Agora o Google retorna só o array direto
        
        if(mensagens.length !== ultimaQtd) {
            document.getElementById('msgs').innerHTML = mensagens.map(m => {
                const souEu = m.u.toLowerCase() === meuNome;
                return `
                    <div class="bubble ${souEu ? 'msg-me' : 'msg-others'}">
                        ${m.m}
                        <div class="info-meta">${m.h} ${souEu ? '✓✓' : ''}</div>
                    </div>`;
            }).join('');
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
            
            if(ultimaQtd > 0 && mensagens.length > ultimaQtd) {
                if(mensagens[mensagens.length-1].u.toLowerCase() !== meuNome) playSnd('snd-pop');
            }
            ultimaQtd = mensagens.length;
        }
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        const txt = input.value.trim();
        if(!txt) return;
        playSnd('snd-send');
        fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'mensagem', usuario: meuNome, msg: txt }) });
        input.value = "";
    }

    // AVISO DE DIGITANDO
    document.getElementById('msg-input').addEventListener('input', () => {
        fetch(`${URL_SCRIPT}?acao=set_typing&u=${meuNome}&status=sim`);
        clearTimeout(window.tTyping);
        window.tTyping = setTimeout(() => {
            fetch(`${URL_SCRIPT}?acao=set_typing&u=${meuNome}&status=nao`);
        }, 3000);
    });
</script>
</body>
</html>
