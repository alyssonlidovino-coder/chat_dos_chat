<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A Praça</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: #fafafa; margin: 0; height: 100svh; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 500px; background: #fff; height: 100%; display: flex; flex-direction: column; position: relative; border: 1px solid #ddd; }
        
        /* TELAS */
        .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* LOGIN E REGRAS */
        #login-screen { padding: 30px; justify-content: center; align-items: center; text-align: center; }
        .regras { font-size: 11px; color: #ed4956; margin-bottom: 20px; text-align: left; background: #fff1f1; padding: 10px; border-radius: 8px; border: 1px solid #ffcccc; }
        .input-group { width: 100%; position: relative; margin-bottom: 12px; }
        input { width: 100%; padding: 14px; border: 1px solid #dbdbdb; border-radius: 8px; font-size: 16px; background: #fafafa; }
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #0095f6; color: white; font-weight: bold; cursor: pointer; }

        /* LISTA */
        .user-card { padding: 15px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .online-dot { width: 10px; height: 10px; border-radius: 50%; background: #47dc31; display: inline-block; margin-right: 5px; }
        .offline-dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; display: inline-block; margin-right: 5px; }

        /* CHAT */
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #fdfdfd; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; max-width: 80%; position: relative; }
        .msg-me { align-self: flex-end; background: #3797f0; color: #fff; }
        .msg-others { align-self: flex-start; background: #efefef; color: #262626; }
        .header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen">
        <h1 style="margin-bottom:5px;">A Praça</h1>
        
        <div class="regras">
            <b>Regras de acesso:</b><br>
            • Nome: Máximo 10 letras (A-Z), sem números.<br>
            • Senha: Exatamente 4 dígitos (ex: 0123).
        </div>

        <div class="input-group">
            <input type="text" id="user" placeholder="Usuário (Só letras)" maxlength="10">
        </div>
        <div class="input-group">
            <input type="text" id="pass" placeholder="Senha (4 números)" maxlength="4" inputmode="numeric">
        </div>
        
        <button class="btn-main" id="btn-entrar" onclick="validar('entrar')">ENTRAR</button>
        <button onclick="validar('cadastrar')" style="border:none; background:none; color:#0095f6; margin-top:20px; font-weight:bold; cursor:pointer">CRIAR CONTA</button>
        <p id="status-msg" style="font-size:12px; color:red; margin-top:10px;"></p>
    </div>

    <div id="list-screen" class="screen" style="display:none">
        <div class="header">
            <span>Contatos</span>
            <button onclick="location.reload()" style="border:none; background:none; color:#ed4956; font-weight:bold;">Sair</button>
        </div>
        <div id="user-list"></div>
    </div>

    <div id="chat-screen" class="screen" style="display:none">
        <div class="header">
            <button onclick="voltar()" style="border:none; background:none; font-size:20px; cursor:pointer">‹</button>
            <span id="chat-title">Chat</span>
            <div style="width:20px"></div>
        </div>
        <div id="msgs"></div>
        <div style="padding:10px; display:flex; gap:10px; border-top:1px solid #eee">
            <input type="text" id="msg-input" placeholder="Mensagem..." style="border-radius:20px">
            <button onclick="enviar()" style="border:none; background:none; color:#0095f6; font-weight:bold;">Enviar</button>
        </div>
    </div>
</div>

<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
<audio id="snd-send" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec"; 
    let meuNome = "";
    let ultimaQtd = 0;
    let loopChat, loopLista;

    function som(id) { document.getElementById(id).play().catch(()=>{}); }

    // --- BLOCO: VALIDAÇÃO DE REGRAS ---
    function validar(tipo) {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        const msg = document.getElementById('status-msg');
        
        // Regra 1: Apenas letras no nome
        const apenasLetras = /^[A-Za-zÀ-ÖØ-öø-ÿ]+$/;
        if (!apenasLetras.test(u)) {
            msg.innerText = "Nome deve conter apenas letras!";
            return;
        }

        // Regra 2: Senha de 4 dígitos (aceitando zeros)
        if (s.length !== 4 || isNaN(s)) {
            msg.innerText = "Senha deve ter exatamente 4 números!";
            return;
        }

        msg.innerText = "";
        som('snd-click');
        if (tipo === 'entrar') entrar(u, s);
        else cadastrar(u, s);
    }

    async function entrar(u, s) {
        document.getElementById('status-msg').style.color = "gray";
        document.getElementById('status-msg').innerText = "conectando...";
        
        const res = await fetch(`${URL_SCRIPT}?acao=login&u=${encodeURIComponent(u)}&s=${encodeURIComponent(s)}`);
        const txt = await res.text();
        
        if (txt.trim() === "ok") {
            meuNome = u.toLowerCase();
            localStorage.setItem('p_user_nome', u);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('list-screen').style.display = 'flex';
            carregarUsuarios();
            loopLista = setInterval(carregarUsuarios, 10000);
        } else {
            document.getElementById('status-msg').style.color = "red";
            document.getElementById('status-msg').innerText = "Usuário ou senha incorretos!";
        }
    }

    async function carregarUsuarios() {
        try {
            const res = await fetch(`${URL_SCRIPT}?acao=get_all_users`);
            const users = await res.json();
            const container = document.getElementById('user-list');
            container.innerHTML = users.map(u => {
                if(u.nome.toLowerCase() === meuNome) return '';
                const dot = u.status === 'Online' ? 'online-dot' : 'offline-dot';
                return `<div class="user-card" onclick="abrirChat('${u.nome}')">
                            <span>${u.nome}</span>
                            <small><span class="${dot}"></span>${u.status}</small>
                        </div>`;
            }).join('');
        } catch(e) { console.error("Erro lista"); }
    }

    function abrirChat(nome) {
        som('snd-click');
        clearInterval(loopLista);
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-title').innerText = nome;
        carregarMensagens();
        loopChat = setInterval(carregarMensagens, 3000);
    }

    async function carregarMensagens() {
        const res = await fetch(URL_SCRIPT);
        const msgs = await res.json();
        if(msgs.length !== ultimaQtd) {
            document.getElementById('msgs').innerHTML = msgs.map(m => {
                const eu = m.u.toLowerCase() === meuNome;
                return `<div class="bubble ${eu?'msg-me':'msg-others'}">${m.m}<span style="font-size:8px; display:block; opacity:0.6">${m.h}</span></div>`;
            }).join('');
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
            if(ultimaQtd > 0 && msgs.length > ultimaQtd && msgs[msgs.length-1].u.toLowerCase() !== meuNome) som('snd-pop');
            ultimaQtd = msgs.length;
        }
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        som('snd-send');
        fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'mensagem', usuario: meuNome, msg: input.value }) });
        input.value = "";
    }

    async function cadastrar(u, s) {
        const res = await fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({ tipo: 'cadastro', usuario: u, senha: s }) });
        const txt = await res.text();
        if(txt === "duplicado") alert("Este nome já existe!");
        else alert("Conta criada! Agora clique em ENTRAR.");
    }

    function voltar() { som('snd-click'); clearInterval(loopChat); document.getElementById('chat-screen').style.display = 'none'; document.getElementById('list-screen').style.display = 'flex'; carregarUsuarios(); }
</script>
</body>
</html>
