<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Zap Praça Premium</title>
    <style>
        /* --- ESTILOS GERAIS E CORES ZAP --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background: #cfd8dc; margin: 0; height: 100svh; display: flex; justify-content: center; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: #e5ddd5; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        /* HEADER */
        .header { background: #075e54; color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; }
        .btn-header { border: none; background: none; color: white; font-size: 14px; cursor: pointer; }

        .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* LOGIN */
        #login-screen { background: #fff; padding: 30px; justify-content: center; align-items: center; text-align: center; }
        .input-group { width: 100%; position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; background: #f8f8f8; }
        .btn-ver { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); border: none; background: none; color: #075e54; font-weight: bold; cursor: pointer; }
        .btn-entrar { width: 100%; padding: 15px; border: none; border-radius: 8px; background: #25d366; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* LISTA DE CONTATOS */
        #user-list { background: #fff; flex: 1; overflow-y: auto; }
        .user-card { padding: 12px 16px; border-bottom: 1px solid #f2f2f2; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; background: #dfe5e7; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #919191; font-size: 20px; font-weight: bold; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; }
        .dot-online { background: #06d755; box-shadow: 0 0 5px #06d755; }

        /* CHAT */
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 4px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain; }
        .bubble { padding: 6px 10px; font-size: 14.5px; max-width: 85%; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); line-height: 1.4; }
        .msg-me { align-self: flex-end; background: #dcf8c6; color: #303030; border-radius: 8px 0 8px 8px; }
        .msg-others { align-self: flex-start; background: #fff; color: #303030; border-radius: 0 8px 8px 8px; }
        
        /* HORA E CHECKS */
        .meta { display: flex; align-items: center; justify-content: flex-end; gap: 3px; font-size: 10px; color: #888; margin-top: 2px; }
        .check-enviado { color: #999; font-weight: bold; }
        .check-lido { color: #34b7f1; font-weight: bold; }

        #typing-msg { height: 22px; padding: 2px 16px; font-size: 12px; color: #075e54; font-weight: 500; background: rgba(255,255,255,0.9); }

        .input-area { background: #f0f0f0; padding: 8px 12px; display: flex; gap: 8px; align-items: center; }
        #msg-input { flex: 1; border-radius: 20px; padding: 10px 15px; border: none; }
        .btn-send { background: #075e54; color: white; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen">
        <div style="background:#075e54; width:70px; height:70px; border-radius:18px; margin-bottom:20px; display:flex; align-items:center; justify-content:center; color:white; font-size:35px;">🌳</div>
        <h2 style="color:#075e54; margin-top:0;">A Praça Premium</h2>
        <div class="input-group"><input type="text" id="user" placeholder="Usuário"></div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-ver" onclick="toggleSenha()">VER</button>
        </div>
        <button class="btn-entrar" onclick="entrar()">ENTRAR</button>
        <p id="status-log" style="font-size:12px; color:#888; margin-top:15px; min-height:15px;"></p>
        <button onclick="cadastrar()" style="background:none; border:none; color:#075e54; margin-top:10px; cursor:pointer">Criar nova conta</button>
    </div>

    <div id="list-screen" class="screen" style="display:none">
        <div class="header">
            <span>WhatsApp Praça</span>
            <button class="btn-header" onclick="location.reload()">Sair</button>
        </div>
        <div id="user-list"></div>
    </div>

    <div id="chat-screen" class="screen" style="display:none">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px">
                <button class="btn-header" onclick="fecharChat()" style="font-size:22px">←</button>
                <div id="chat-title">Contato</div>
            </div>
            <button class="btn-header" onclick="limparChatPlanilha()">Limpar</button>
        </div>
        <div id="msgs"></div>
        <div id="typing-msg"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Mensagem" autocomplete="off">
            <button class="btn-send" onclick="enviar()">➤</button>
        </div>
    </div>
</div>

<audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
<audio id="snd-typing" src="https://assets.mixkit.co/active_storage/sfx/1103/1103-preview.mp3" loop></audio>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec"; 
    let meuNome = "";
    let ultimaQtd = 0;
    let chatAberto = false;
    let statusAba = "ativo";

    // 1. DETECÇÃO DE ATIVIDADE (ONLINE/OFFLINE REAL)
    document.addEventListener("visibilitychange", () => {
        statusAba = document.hidden ? "inativo" : "ativo";
        enviarPresenca();
    });

    function enviarPresenca(digitando = "nao") {
        if(!meuNome) return;
        fetch(`${URL_SCRIPT}?acao=presenca&u=${meuNome}&status=${statusAba}&digitando=${digitando}`);
    }

    function toggleSenha() {
        const p = document.getElementById('pass');
        p.type = p.type === "password" ? "text" : "password";
    }

    async function entrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(!u || !s) return;
        document.getElementById('status-log').innerText = "conectando...";
        try {
            const res = await fetch(`${URL_SCRIPT}?acao=login&u=${encodeURIComponent(u)}&s=${encodeURIComponent(s)}`);
            if(await res.text() === "ok") {
                meuNome = u.toLowerCase();
                localStorage.setItem('p_user_nome', u);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('list-screen').style.display = 'flex';
                setInterval(sincronizar, 3000);
            } else {
                alert("Usuário ou senha incorretos.");
                document.getElementById('status-log').innerText = "";
            }
        } catch(e) { document.getElementById('status-log').innerText = "Erro de rede."; }
    }

    // 2. SINCRONIZAÇÃO (MENSAGENS, LIDO E ONLINE)
    async function sincronizar() {
        try {
            if(chatAberto) {
                // Se o chat está aberto, avisa o script para marcar mensagens dos outros como lidas
                fetch(`${URL_SCRIPT}?acao=ler&u=${meuNome}`);
            }

            // Envia status de digitação baseado no input
            const digitandoAgora = document.getElementById('msg-input').value.length > 0 ? "sim" : "nao";
            enviarPresenca(digitandoAgora);

            const res = await fetch(URL_SCRIPT);
            const data = await res.json();

            // Atualiza Lista de Usuários
            if(!chatAberto) {
                document.getElementById('user-list').innerHTML = data.usuarios.map(u => {
                    if(u.nome.toLowerCase() === meuNome) return '';
                    return `
                        <div class="user-card" onclick="abrirChat('${u.nome}')">
                            <div class="user-info">
                                <div class="avatar">${u.nome[0].toUpperCase()}</div>
                                <span>${u.nome}</span>
                            </div>
                            <div class="dot ${u.status === 'online' ? 'dot-online' : ''}"></div>
                        </div>`;
                }).join('');
            }

            // Gerencia Som e Texto de Digitação
            const tMsg = document.getElementById('typing-msg');
            const sTyp = document.getElementById('snd-typing');
            if(data.digitando && data.digitando.toLowerCase() !== meuNome) {
                tMsg.innerText = data.digitando + " está digitando...";
                if(chatAberto) sTyp.play().catch(()=>{});
            } else {
                tMsg.innerText = "";
                sTyp.pause();
            }

            // Atualiza Balões de Mensagem
            if(chatAberto && data.mensagens.length !== ultimaQtd) {
                document.getElementById('msgs').innerHTML = data.mensagens.map(m => {
                    const souEu = m.u.toLowerCase() === meuNome;
                    const checkClass = m.lido ? "check-lido" : "check-enviado";
                    return `
                        <div class="bubble ${souEu ? 'msg-me' : 'msg-others'}">
                            ${m.m}
                            <div class="meta">
                                ${m.h} ${souEu ? `<span class="${checkClass}">✓✓</span>` : ''}
                            </div>
                        </div>`;
                }).join('');
                
                const div = document.getElementById('msgs');
                div.scrollTop = div.scrollHeight;

                if(ultimaQtd > 0 && data.mensagens.length > ultimaQtd) {
                    if(data.mensagens[data.mensagens.length-1].u.toLowerCase() !== meuNome) {
                        document.getElementById('snd-pop').play();
                    }
                }
                ultimaQtd = data.mensagens.length;
            }
        } catch(e){}
    }

    function abrirChat(nome) {
        chatAberto = true;
        document.getElementById('chat-title').innerText = nome;
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        ultimaQtd = 0; // Força recarregamento ao abrir
    }

    function fecharChat() {
        chatAberto = false;
        document.getElementById('chat-screen').style.display = 'none';
        document.getElementById('list-screen').style.display = 'flex';
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        const txt = input.value.trim();
        if(!txt) return;
        fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'mensagem', usuario: meuNome, msg: txt }) });
        input.value = "";
        enviarPresenca("nao");
    }

    async function limparChatPlanilha() {
        if(!confirm("Isso apagará o histórico para TODOS. Continuar?")) return;
        await fetch(`${URL_SCRIPT}?acao=limpar`);
        document.getElementById('msgs').innerHTML = "";
        ultimaQtd = 0;
        location.reload();
    }

    async function cadastrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(!u || s.length < 4) return alert("Nome e senha (min. 4 dígitos) necessários.");
        await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'cadastro', usuario: u, senha: s }) });
        alert("Conta criada! Agora clique em Entrar.");
    }
</script>
</body>
</html>
