<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Praça</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: #fafafa; margin: 0; display: flex; justify-content: center; height: 100svh; overflow: hidden; }
        #app { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; height: 100%; }
        .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        input { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        .btn-main { width: 100%; padding: 14px; background: #0095f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* LISTA */
        .user-card { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .status { font-size: 11px; font-weight: bold; }
        .typing-text { font-size: 10px; color: #0095f6; font-style: italic; }

        /* CHAT */
        #msgs { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 15px; background: #fdfdfd; }
        .bubble { padding: 8px 12px; border-radius: 18px; max-width: 85%; font-size: 14px; position: relative; }
        .msg-me { align-self: flex-end; background: #0095f6; color: white; }
        .msg-others { align-self: flex-start; background: #efefef; color: #333; }
        .meta { font-size: 9px; display: flex; justify-content: flex-end; gap: 3px; margin-top: 2px; opacity: 0.8; }
        .check-blue { color: #20f3ff; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen" style="padding:40px; justify-content:center;">
        <h2 style="text-align:center">A Praça</h2>
        <input type="text" id="user" placeholder="Usuário" maxlength="10">
        <input type="password" id="pass" placeholder="Senha" maxlength="4">
        <button class="btn-main" onclick="processar('login')">ENTRAR</button>
        <button onclick="processar('cadastro')" style="background:none; border:none; color:#0095f6; margin-top:15px; font-weight:bold;">Criar Conta</button>
        <p id="feedback" style="text-align:center; color:red; font-size:12px"></p>
    </div>

    <div id="list-screen" class="screen" style="display:none">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
            <b>Conversas</b>
            <span onclick="location.reload()" style="color:red; cursor:pointer">Sair</span>
        </div>
        <div id="user-list"></div>
    </div>

    <div id="chat-screen" class="screen" style="display:none">
        <div style="padding:15px; border-bottom:1px solid #eee; display:flex; align-items:center; gap:10px">
            <button onclick="voltar()" style="border:none; background:none; font-size:24px;">‹</button>
            <div>
                <b id="chat-title">Nome</b><br>
                <span id="chat-status" class="typing-text" style="display:none">digitando...</span>
            </div>
        </div>
        <div id="msgs"></div>
        <div style="padding:10px; border-top:1px solid #eee; display:flex; gap:8px">
            <input type="text" id="msg-input" placeholder="Mensagem..." style="margin:0" oninput="avisarDigitando()">
            <button onclick="enviar()" style="border:none; background:none; color:#0095f6; font-weight:bold">Enviar</button>
        </div>
    </div>
</div>

<audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
<audio id="snd-send" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="snd-writing" src="https://assets.mixkit.co/active_storage/sfx/2544/2544-preview.mp3" loop></audio>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec"; 
    let meuNome = "", chatCom = "", ultimaQtd = 0, isDig = false, timerDig;

    async function processar(tipo) {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        const res = await fetch(`${URL_SCRIPT}?acao=${tipo}&u=${u}&s=${s}`);
        if(await res.text() === "ok") {
            if(tipo === 'cadastro') alert("Pronto!");
            else {
                meuNome = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('list-screen').style.display = 'flex';
                carregarUsuarios();
                setInterval(carregarUsuarios, 5000);
                setInterval(manterOnline, 10000);
            }
        } else { document.getElementById('feedback').innerText = "Erro!"; }
    }

    function manterOnline() { fetch(`${URL_SCRIPT}?acao=ping&u=${meuNome}&dig=${isDig?'sim':'não'}`); }

    function avisarDigitando() {
        isDig = true;
        clearTimeout(timerDig);
        timerDig = setTimeout(() => { isDig = false; }, 3000);
    }

    async function carregarUsuarios() {
        const res = await fetch(`${URL_SCRIPT}?acao=get_users`);
        const users = await res.json();
        document.getElementById('user-list').innerHTML = users.map(u => {
            if(u.nome.toLowerCase() === meuNome.toLowerCase()) return '';
            const statusColor = u.status === 'Online' ? 'green' : '#999';
            return `<div class="user-card" onclick="abrirChat('${u.nome}')">
                <span>${u.nome} ${u.digitando?'<small class="typing-text">...digitando</small>':''}</span>
                <span class="status" style="color:${statusColor}">${u.status}</span>
            </div>`;
        }).join('');
        
        // Se estiver no chat com alguém e ele estiver digitando, toca o som e mostra status
        const outro = users.find(u => u.nome === chatCom);
        if(outro && outro.digitando) {
            document.getElementById('chat-status').style.display = 'block';
            document.getElementById('snd-writing').play().catch(()=>{});
        } else {
            document.getElementById('chat-status').style.display = 'none';
            document.getElementById('snd-writing').pause();
        }
    }

    function abrirChat(nome) {
        chatCom = nome; ultimaQtd = 0;
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-title').innerText = nome;
        carregarMensagens();
        window.loopChat = setInterval(carregarMensagens, 3000);
    }

    async function carregarMensagens() {
        if(!chatCom) return;
        const res = await fetch(`${URL_SCRIPT}?acao=get_msgs&eu=${meuNome}&outro=${chatCom}`);
        const msgs = await res.json();
        if(msgs.length !== ultimaQtd) {
            document.getElementById('msgs').innerHTML = msgs.map(m => {
                const eu = m.u.toLowerCase() === meuNome.toLowerCase();
                let check = '✓';
                if(m.status === 'enviada' && eu) check = '✓';
                if(m.status === 'lida' && eu) check = '<span class="check-blue">✓✓</span>';
                return `<div class="bubble ${eu?'msg-me':'msg-others'}">${m.m}
                    <div class="meta"><span>${m.h}</span> ${eu?check:''}</div>
                </div>`;
            }).join('');
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
            if(ultimaQtd > 0 && msgs.length > ultimaQtd && msgs[msgs.length-1].u.toLowerCase() !== meuNome.toLowerCase()) document.getElementById('snd-pop').play();
            ultimaQtd = msgs.length;
        }
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        document.getElementById('snd-send').play();
        fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
            tipo: 'mensagem', de: meuNome, para: chatCom, msg: input.value 
        }) });
        input.value = "";
    }

    function voltar() { clearInterval(window.loopChat); chatCom = ""; document.getElementById('chat-screen').style.display = 'none'; document.getElementById('list-screen').style.display = 'flex'; }
</script>
</body>
</html>
