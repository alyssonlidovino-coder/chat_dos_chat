<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A Praça - Premium</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #fafafa; margin: 0; height: 100svh; display: flex; justify-content: center; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: #fff; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        .header { padding: 15px; border-bottom: 1px solid #dbdbdb; display: flex; align-items: center; justify-content: space-between; font-weight: bold; background: #fff; z-index: 10; }
        .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* --- LOGIN --- */
        #login-screen { padding: 40px 20px; align-items: center; justify-content: center; }
        .input-group { width: 100%; position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 14px; border: 1px solid #dbdbdb; border-radius: 10px; background: #fafafa; font-size: 16px; outline: none; }
        .btn-ver { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); border: none; background: none; color: #0095f6; font-weight: bold; font-size: 12px; cursor: pointer; }
        .btn-main { width: 100%; padding: 15px; border: none; border-radius: 10px; background: #0095f6; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* --- LISTA --- */
        .user-card { padding: 15px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
        .on { background: #e7fbd3; color: #25d366; }
        .off { background: #f0f0f0; color: #999; }

        /* --- CHAT --- */
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .msg-me { align-self: flex-end; background: #3797f0; color: #fff; border-bottom-right-radius: 4px; }
        .msg-others { align-self: flex-start; background: #efefef; color: #262626; border-bottom-left-radius: 4px; }
        .info { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 9px; margin-top: 4px; opacity: 0.8; }
        .check { color: #fff; font-weight: bold; } /* O "V" branco no fundo azul */

        #typing-area { height: 22px; padding: 0 15px; font-size: 11px; color: #0095f6; font-weight: 500; display: flex; align-items: center; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen">
        <h1 style="margin-bottom:30px;">A Praça</h1>
        <div class="input-group"><input type="text" id="user" placeholder="Usuário"></div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-ver" onclick="togglePass()">VER</button>
        </div>
        <button class="btn-main" onclick="entrar()">Entrar</button>
        <p id="status" style="font-size:12px; color:gray; margin-top:10px; height:15px;"></p>
        <button onclick="cadastrar()" style="border:none; background:none; color:#0095f6; margin-top:20px;">Criar Conta</button>
    </div>

    <div id="list-screen" class="screen" style="display:none">
        <div class="header"><span>Conversas</span><button onclick="location.reload()" style="border:none; color:#ed4956; background:none;">Sair</button></div>
        <div id="user-list"></div>
    </div>

    <div id="chat-screen" class="screen" style="display:none">
        <div class="header">
            <button onclick="voltar()" style="border:none; background:none; font-size:25px;">‹</button>
            <span id="chat-title">Chat</span>
            <div style="width:30px"></div>
        </div>
        <div id="msgs"></div>
        <div id="typing-area"></div>
        <div style="padding: 10px; display: flex; gap: 10px; border-top: 1px solid #efefef;">
            <input type="text" id="msg-input" placeholder="Mensagem..." style="border-radius:20px; flex:1;">
            <button onclick="enviar()" style="border:none; background:none; color:#0095f6; font-weight:bold;">Enviar</button>
        </div>
    </div>
</div>

<audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
<audio id="snd-typing" src="https://assets.mixkit.co/active_storage/sfx/1103/1103-preview.mp3" loop></audio>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec"; 
    let meuNome = "";
    let ultimaQtd = 0;
    let chatAtivo = false;

    // BOTÃO VER SENHA
    function togglePass() {
        const p = document.getElementById('pass');
        p.type = p.type === "password" ? "text" : "password";
    }

    async function entrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(!u || !s) return;
        document.getElementById('status').innerText = "conectando...";
        const res = await fetch(`${URL_SCRIPT}?acao=login&u=${encodeURIComponent(u)}&s=${encodeURIComponent(s)}`);
        if(await res.text() === "ok") {
            meuNome = u.toLowerCase();
            localStorage.setItem('p_user_nome', u);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('list-screen').style.display = 'flex';
            setInterval(sync, 3000);
        } else {
            alert("Erro!");
            document.getElementById('status').innerText = "";
        }
    }

    async function sync() {
        try {
            const res = await fetch(URL_SCRIPT + "?acao=get_all_users"); // O doGet agora retorna tudo
            const data = await res.json();
            
            // ATUALIZA LISTA DE USUÁRIOS (SÓ SE NÃO ESTIVER NO CHAT)
            if(!chatAtivo) {
                document.getElementById('user-list').innerHTML = data.usuarios.map(u => {
                    if(u.nome.toLowerCase() === meuNome) return '';
                    return `<div class="user-card" onclick="abrirChat('${u.nome}')">
                        <span>${u.nome}</span>
                        <span class="status-badge ${u.status === 'online' ? 'on' : 'off'}">${u.status}</span>
                    </div>`;
                }).join('');
            }

            // ATUALIZA DIGITANDO
            const tArea = document.getElementById('typing-area');
            const sTyping = document.getElementById('snd-typing');
            if(data.digitando && data.digitando.toLowerCase() !== meuNome) {
                tArea.innerText = data.digitando + " está digitando...";
                if(chatAtivo) sTyping.play().catch(()=>{});
            } else {
                tArea.innerText = "";
                sTyping.pause();
            }

            // ATUALIZA MENSAGENS
            if(chatAtivo && data.mensagens.length !== ultimaQtd) {
                document.getElementById('msgs').innerHTML = data.mensagens.map(m => {
                    const souEu = m.u.toLowerCase() === meuNome;
                    return `<div class="bubble ${souEu ? 'msg-me' : 'msg-others'}">
                        ${m.m}
                        <div class="info"><span>${m.h}</span>${souEu ? '<span class="check">✓✓</span>' : ''}</div>
                    </div>`;
                }).join('');
                document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
                if(ultimaQtd > 0 && data.mensagens.length > ultimaQtd) {
                    if(data.mensagens[data.mensagens.length-1].u.toLowerCase() !== meuNome) document.getElementById('snd-pop').play();
                }
                ultimaQtd = data.mensagens.length;
            }
        } catch(e) {}
    }

    function abrirChat(nome) {
        chatAtivo = true;
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-title').innerText = nome;
    }

    function voltar() {
        chatAtivo = false;
        document.getElementById('chat-screen').style.display = 'none';
        document.getElementById('list-screen').style.display = 'flex';
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'mensagem', usuario: meuNome, msg: input.value }) });
        input.value = "";
        fetch(`${URL_SCRIPT}?acao=set_typing&u=${meuNome}&status=nao`);
    }

    // LISTENER DE DIGITANDO
    document.getElementById('msg-input').addEventListener('input', () => {
        fetch(`${URL_SCRIPT}?acao=set_typing&u=${meuNome}&status=sim`);
        clearTimeout(window.tTyp);
        window.tTyp = setTimeout(() => {
            fetch(`${URL_SCRIPT}?acao=set_typing&u=${meuNome}&status=nao`);
        }, 4000);
    });
</script>
</body>
</html>
