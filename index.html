<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Praça - Oficial</title>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { width: 350px; background: white; height: 80vh; border-radius: 15px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
        .screen { padding: 20px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
        #chat-screen { display: none; }
        input { padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin-top: 5px; }
        .btn-green { background: #25d366; }
        .btn-blue { background: #34b7f1; }
        #msgs { flex-grow: 1; overflow-y: auto; background: #f0f0f0; border-radius: 10px; padding: 10px; margin-bottom: 10px; }
        .b { background: white; padding: 8px; border-radius: 8px; margin-bottom: 5px; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen">
        <h2 style="text-align:center; color:#075e54">🌳 A Praça</h2>
        <input type="text" id="user" placeholder="Usuário">
        <input type="number" id="pass" placeholder="Senha (4 números)" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4)">
        <button class="btn-green" onclick="entrar()">Entrar</button>
        <button class="btn-blue" onclick="cadastrar()">Criar Conta</button>
    </div>

    <div id="chat-screen" class="screen">
        <div id="msgs"></div>
        <div style="display:flex; gap:5px">
            <input type="text" id="msg" placeholder="Conversar..." style="flex-grow:1" onkeypress="if(event.key==='Enter') enviar()">
            <button class="btn-green" onclick="enviar()">></button>
        </div>
    </div>
</div>

<script>
    // 1. COLE SEU LINK AQUI:
    const URL = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec";

    async function entrar() {
        const u = document.getElementById('user').value;
        const s = document.getElementById('pass').value;
        if(!u || !s) return alert("Preencha tudo!");

        // Verifica login na planilha
        const res = await fetch(`${URL}?acao=login&u=${u}&s=${s}`);
        const texto = await res.text();

        if(texto === "ok") {
            localStorage.setItem('p_user', u);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            setInterval(carregar, 3000);
        } else {
            alert("Usuário ou senha incorretos!");
        }
    }

    function cadastrar() {
        const u = document.getElementById('user').value;
        const s = document.getElementById('pass').value;
        if(s.length !== 4) return alert("A senha deve ter exatamente 4 números!");

        fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'cadastro', usuario: u, senha: s }) });
        alert("Cadastro solicitado! Tente logar em 5 segundos.");
    }

    async function carregar() {
        const res = await fetch(URL);
        const dados = await res.json();
        const div = document.getElementById('msgs');
        div.innerHTML = dados.map(m => `<div class="b"><b>${m.usuario}:</b> ${m.msg}</div>`).join('');
        div.scrollTop = div.scrollHeight;
    }

    function enviar() {
        const input = document.getElementById('msg');
        const user = localStorage.getItem('p_user');
        if(!input.value) return;

        fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'mensagem', usuario: user, msg: input.value }) });
        input.value = "";
    }
</script>
</body>
</html>
