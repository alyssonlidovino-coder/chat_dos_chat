<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A Praça - Premium</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: #fafafa; margin: 0; height: 100svh; display: flex; justify-content: center; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: #fff; height: 100%; display: flex; flex-direction: column; position: relative; border-left: 1px solid #ddd; border-right: 1px solid #ddd; }
        
        /* CABEÇALHOS */
        .header { background: #fff; border-bottom: 1px solid #dbdbdb; padding: 15px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; }
        .btn-acao { border: none; background: none; color: #0095f6; cursor: pointer; font-weight: bold; }

        /* TELAS */
        .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* LOGIN */
        #login-screen { padding: 40px; justify-content: center; align-items: center; text-align: center; }
        .input-group { width: 100%; position: relative; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #dbdbdb; border-radius: 8px; background: #fafafa; }
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #0095f6; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* CONTATOS */
        .user-card { padding: 15px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background: #47dc31; }
        .offline { background: #ccc; }

        /* CHAT */
        #msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #f9f9f9; }
        .bubble { padding: 10px; border-radius: 15px; font-size: 14px; max-width: 80%; line-height: 1.4; position: relative; }
        .msg-me { align-self: flex-end; background: #3797f0; color: #fff; }
        .msg-others { align-self: flex-start; background: #efefef; color: #262626; }
        .hora { font-size: 9px; opacity: 0.7; display: block; text-align: right; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen">
        <h1 style="color:#262626">A Praça</h1>
        <div class="input-group"><input type="text" id="user" placeholder="Usuário"></div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="Senha" maxlength="4">
            <button onclick="togglePass()" style="position:absolute; right:10px; top:12px; border:none; background:none; color:#0095f6; font-size:10px; font-weight:bold;">VER</button>
        </div>
        <button class="btn-main" id="btn-entrar" onclick="entrar()">ENTRAR</button>
        <p id="status-label" style="font-size:12px; color:gray;"></p>
        <button onclick="cadastrar()" style="border:none; background:none; color:#0095f6; margin-top:20px; font-weight:bold;">Criar Conta</button>
    </div>

    <div id="list-screen" class="screen" style="display:none">
        <div class="header">
            <span>Conversas</span>
            <button class="btn-acao" onclick="sair()">Sair</button>
        </div>
        <div id="user-list"></div>
    </div>

    <div id="chat-screen" class="screen" style="display:none">
        <div class="header">
            <button onclick="voltar()" style="border:none; background:none; font-size:20px; cursor:pointer">‹</button>
            <span id="chat-title">Chat</span>
            <div style="width:20px"></div>
        </div>
        <div id="msgs"></div>
        <div style="padding:10px; display:flex; gap:10px; border-top:1px solid #eee">
            <input type="text" id="msg-input" placeholder="Mensagem..." style="border-radius:20px">
            <button onclick="enviar()" style="border:none; background:none; color:#0095f6; font-weight:bold;">Enviar</button>
        </div>
    </div>
</div>

<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
<audio id="snd-send" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec"; 
    let meuNome = "";
    let ultimaQtd = 0;
    let loopChat, loopLista;

    function som(id) { document.getElementById(id).play().catch(()=>{}); }
    function togglePass() { const p = document.getElementById('pass'); p.type = p.type==='password'?'text':'password'; }

    async function entrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(!u || !s) return;
        som('snd-click');
        document.getElementById('status-label').innerText = "conectando...";
        
        const res = await fetch(`${URL_SCRIPT}?acao=login&u=${encodeURIComponent(u)}&s=${encodeURIComponent(s)}`);
        if(await res.text() === "ok") {
            meuNome = u.toLowerCase();
            localStorage.setItem('p_user_nome', u);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('list-screen').style.display = 'flex';
            carregarUsuarios();
            loopLista = setInterval(carregarUsuarios, 10000); // Atualiza lista a cada 10s
        } else {
            alert("Erro!");
            document.getElementById('status-label').innerText = "";
        }
    }

    async function carregarUsuarios() {
        const res = await fetch(`${URL_SCRIPT}?acao=get_all_users`);
        const users = await res.json();
        const container = document.getElementById('user-list');
        container.innerHTML = users.map(u => {
            if(u.nome.toLowerCase() === meuNome) return '';
            const cor = u.status === 'Online' ? 'online' : 'offline';
            return `<div class="user-card" onclick="abrirChat('${u.nome}')">
                        <span>${u.nome}</span>
                        <span><span class="dot ${cor}"></span><small>${u.status}</small></span>
                    </div>`;
        }).join('');
    }

    function abrirChat(nome) {
        som('snd-click');
        clearInterval(loopLista);
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-title').innerText = nome;
        carregarMensagens();
        loopChat = setInterval(carregarMensagens, 3000);
    }

    async function carregarMensagens() {
        const res = await fetch(URL_SCRIPT);
        const msgs = await res.json();
        if(msgs.length !== ultimaQtd) {
            document.getElementById('msgs').innerHTML = msgs.map(m => {
                const eu = m.u.toLowerCase() === meuNome;
                return `<div class="bubble ${eu?'msg-me':'msg-others'}">${m.m}<span class="hora">${m.h}</span></div>`;
            }).join('');
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
            if(ultimaQtd > 0 && msgs.length > ultimaQtd && msgs[msgs.length-1].u.toLowerCase() !== meuNome) som('snd-pop');
            ultimaQtd = msgs.length;
        }
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        som('snd-send');
        fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'mensagem', usuario: meuNome, msg: input.value }) });
        input.value = "";
    }

    function voltar() { som('snd-click'); clearInterval(loopChat); document.getElementById('chat-screen').style.display = 'none'; document.getElementById('list-screen').style.display = 'flex'; carregarUsuarios(); loopLista = setInterval(carregarUsuarios, 10000); }
    function sair() { som('snd-click'); location.reload(); }

    async function cadastrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(!u || !s) return alert("Preencha!");
        som('snd-click');
        const res = await fetch(URL_SCRIPT, { method: 'POST', body: JSON.stringify({ tipo: 'cadastro', usuario: u, senha: s }) });
        alert("Conta criada ou Verifique se o nome já existe!");
    }
</script>
</body>
</html>
