<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Praça - Chat Oficial</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #cfd8dc; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #app { width: 100%; max-width: 400px; background: #e5ddd5; height: 90vh; border-radius: 15px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.3); overflow: hidden; }
        .screen { padding: 20px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
        #msgs { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 15px; background: #e5ddd5; }
        .bubble { padding: 10px 14px; border-radius: 12px; font-size: 15px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .msg-me { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .msg-others { align-self: flex-start; background: #ffffff; border-bottom-left-radius: 2px; }
        .bubble b { display: block; font-size: 11px; color: #075e54; margin-bottom: 3px; text-transform: uppercase; }
        .input-area { display: flex; gap: 8px; background: #f0f0f0; padding: 12px; border-top: 1px solid #ddd; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 16px; }
        button { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; background: #25d366; color: white; transition: 0.3s; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen" style="background:white">
        <h2 style="text-align:center; color:#075e54; margin-bottom:30px">🌳 A Praça</h2>
        <input type="text" id="user" placeholder="Seu nome de usuário">
        <input type="number" id="pass" placeholder="Senha (4 números)" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4)">
        <button onclick="entrar()" style="margin-top:15px">Entrar no Chat</button>
        <button onclick="cadastrar()" style="background:#34b7f1; margin-top:10px">Criar Minha Conta</button>
        <p id="status" style="font-size:12px; text-align:center; color:gray; margin-top:20px"></p>
    </div>

    <div id="chat-screen" class="screen" style="display:none; padding:0">
        <div style="background:#075e54; color:white; padding:15px; font-weight:bold; display:flex; justify-content:space-between; align-items:center">
            <span>A Praça 🟢</span>
            <span onclick="location.reload()" style="font-size:12px; cursor:pointer; opacity:0.8">SAIR</span>
        </div>
        <div id="msgs"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Conversar..." style="flex-grow:1" onkeypress="if(event.key==='Enter') enviar()">
            <button onclick="enviar()">➤</button>
        </div>
    </div>
</div>

<script>
    // ⚠️ ATENÇÃO: COLE SEU LINK NOVO AQUI ABAIXO:
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec";
    
    let meuNomeGlobal = "";
    let ultimaQuantidade = 0;

    async function entrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        const status = document.getElementById('status');
        
        if(!u || !s) return alert("Por favor, preencha nome e senha!");
        
        status.innerText = "Verificando... Aguarde.";
        
        try {
            const resposta = await fetch(`${URL_SCRIPT}?acao=login&u=${encodeURIComponent(u)}&s=${encodeURIComponent(s)}`);
            const resultado = await resposta.text();

            if(resultado.trim() === "ok") {
                meuNomeGlobal = u.toLowerCase().trim();
                localStorage.setItem('p_user_nome', u);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                carregar();
                setInterval(carregar, 3000); // Atualiza a cada 3 segundos
            } else {
                alert("Usuário ou senha não encontrados!");
                status.innerText = "";
            }
        } catch(e) {
            alert("Erro ao conectar com o servidor. Tente novamente.");
            status.innerText = "";
        }
    }

    function cadastrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(s.length !== 4) return alert("A senha precisa ter exatamente 4 números!");

        fetch(URL_SCRIPT, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ tipo: 'cadastro', usuario: u, senha: s })
        });
        alert("Cadastro enviado! Aguarde 5 segundos e clique em Entrar.");
    }

    async function carregar() {
        try {
            const res = await fetch(URL_SCRIPT);
            const dados = await res.json();
            const div = document.getElementById('msgs');

            if(dados.length !== ultimaQuantidade) {
                div.innerHTML = dados.map(m => {
                    // COMPARAÇÃO BLINDADA: Ignora maiúsculas e espaços
                    const souEu = m.usuario.toString().toLowerCase().trim() === meuNomeGlobal;
                    return `
                        <div class="bubble ${souEu ? 'msg-me' : 'msg-others'}">
                            <b>${m.usuario}</b>
                            ${m.msg}
                        </div>
                    `;
                }).join('');
                div.scrollTop = div.scrollHeight;
                ultimaQuantidade = dados.length;
            }
        } catch(e) {
            console.log("Sincronizando...");
        }
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        const txt = input.value.trim();
        if(!txt) return;

        const nomeSalvo = localStorage.getItem('p_user_nome');

        fetch(URL_SCRIPT, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ tipo: 'mensagem', usuario: nomeSalvo, msg: txt })
        });

        input.value = "";
    }
</script>

</body>
</html>
