<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A Praça - Premium</title>
    <style>
        /* --- ESTILOS MODERNOS (ESTILO APP) --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fafafa; margin: 0; height: 100svh; display: flex; justify-content: center; overflow: hidden; }
        #app { width: 100%; max-width: 500px; background: #fff; height: 100%; display: flex; flex-direction: column; box-shadow: 0 0 15px rgba(0,0,0,0.05); position: relative; }
        
        /* CABEÇALHOS */
        .header { background: #fff; border-bottom: 1px solid #dbdbdb; padding: 15px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 17px; }
        .btn-back { border: none; background: none; font-size: 28px; cursor: pointer; padding: 0 10px; color: #262626; }

        /* TELAS */
        .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* TELA DE LOGIN */
        #login-screen { padding: 40px 25px; align-items: center; justify-content: center; text-align: center; }
        .logo { font-size: 32px; font-weight: 800; color: #262626; margin-bottom: 30px; letter-spacing: -1.5px; }
        .input-group { width: 100%; position: relative; margin-bottom: 12px; }
        input { width: 100%; padding: 14px; border: 1px solid #dbdbdb; border-radius: 8px; background: #fafafa; font-size: 15px; }
        .btn-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); border: none; background: none; color: #0095f6; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #0095f6; color: white; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .btn-main:disabled { opacity: 0.6; }

        /* LISTA DE CONTATOS */
        .user-card { padding: 12px 15px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .user-card:active { background: #fafafa; }
        .avatar { width: 50px; height: 50px; background: #efefef; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #262626; border: 1px solid #dbdbdb; }

        /* CHAT */
        #msgs { flex: 1; overflow-y: auto; padding: 15px; background: #fff; display: flex; flex-direction: column; gap: 8px; }
        .bubble { padding: 9px 14px; border-radius: 18px; font-size: 14px; max-width: 75%; line-height: 1.4; position: relative; word-wrap: break-word; }
        .msg-me { align-self: flex-end; background: #3797f0; color: #fff; border-bottom-right-radius: 4px; }
        .msg-others { align-self: flex-start; background: #efefef; color: #262626; border-bottom-left-radius: 4px; }
        .info-meta { font-size: 9px; opacity: 0.7; margin-top: 4px; text-align: right; display: flex; justify-content: flex-end; gap: 3px; }

        /* BARRA DE INPUT DO CHAT */
        .chat-input-area { padding: 10px 15px; display: flex; gap: 10px; border-top: 1px solid #efefef; align-items: center; background: #fff; }
        #msg-input { border-radius: 25px; background: #fff; border: 1px solid #dbdbdb; padding: 10px 15px; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen">
        <div class="logo">A Praça</div>
        <div class="input-group">
            <input type="text" id="user" placeholder="Nome de usuário">
        </div>
        <div class="input-group">
            <input type="password" id="pass" placeholder="Senha" maxlength="4">
            <button class="btn-toggle" onclick="togglePass()">VER</button>
        </div>
        <button class="btn-main" id="btn-entrar" onclick="entrar()">Entrar</button>
        <p id="status-label" style="font-size: 12px; color: #8e8e8e; margin-top: 15px; min-height: 1.2em;"></p>
        <button onclick="cadastrar()" style="border:none; background:none; color:#0095f6; margin-top:20px; font-weight:600; font-size:13px;">Criar nova conta</button>
    </div>

    <div id="list-screen" class="screen" style="display:none">
        <div class="header">
            <span>Conversas</span>
            <span style="color:#ed4956; font-size:14px; cursor:pointer" onclick="location.reload()">Sair</span>
        </div>
        <div id="user-list" style="overflow-y:auto">
            </div>
    </div>

    <div id="chat-screen" class="screen" style="display:none">
        <div class="header">
            <button class="btn-back" onclick="voltar()">‹</button>
            <span id="chat-title">Chat</span>
            <div style="width:40px"></div>
        </div>
        <div id="msgs"></div>
        <div class="chat-input-area">
            <input type="text" id="msg-input" placeholder="Mensagem..." autocomplete="off">
            <button onclick="enviar()" style="border:none; background:none; color:#0095f6; font-weight:bold; font-size:15px; cursor:pointer">Enviar</button>
        </div>
    </div>
</div>

<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
<audio id="snd-send" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

<script>
    // --- CONFIGURAÇÃO ---
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec"; 
    let meuNome = "";
    let ultimaQtd = 0;
    let loopChat;

    // --- BLOCO: UTILITÁRIOS ---
    function playSnd(id) { document.getElementById(id).play().catch(()=>{}); }
    
    function togglePass() {
        const p = document.getElementById('pass');
        const btn = document.querySelector('.btn-toggle');
        if(p.type === "password") { p.type = "text"; btn.innerText = "OCULTAR"; }
        else { p.type = "password"; btn.innerText = "VER"; }
    }

    // --- BLOCO: LOGIN ---
    async function entrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(!u || !s) return;
        
        playSnd('snd-click');
        document.getElementById('status-label').innerText = "conectando...";
        document.getElementById('btn-entrar').disabled = true;

        try {
            const res = await fetch(`${URL_SCRIPT}?acao=login&u=${encodeURIComponent(u)}&s=${encodeURIComponent(s)}`);
            const txt = await res.text();
            if(txt.trim() === "ok") {
                meuNome = u.toLowerCase();
                localStorage.setItem('p_user_nome', u);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('list-screen').style.display = 'flex';
                carregarUsuarios();
            } else {
                alert("Usuário ou senha incorretos.");
                document.getElementById('status-label').innerText = "";
                document.getElementById('btn-entrar').disabled = false;
            }
        } catch(e) { 
            alert("Erro de conexão com o servidor."); 
            document.getElementById('btn-entrar').disabled = false;
        }
    }

    // --- BLOCO: LISTA DE USUÁRIOS (Corrigido para não ficar branco) ---
    async function carregarUsuarios() {
        try {
            const res = await fetch(`${URL_SCRIPT}?acao=get_all_users`);
            const users = await res.json();
            const container = document.getElementById('user-list');
            
            if(users.length <= 1) {
                container.innerHTML = "<p style='text-align:center; color:gray; font-size:13px; margin-top:30px;'>Nenhum outro usuário cadastrado ainda.</p>";
                return;
            }

            container.innerHTML = users.map(u => {
                if(u.nome.toLowerCase() === meuNome) return '';
                return `
                    <div class="user-card" onclick="abrirChat('${u.nome}')">
                        <div class="avatar">${u.nome[0].toUpperCase()}</div>
                        <div style="font-weight:600;">${u.nome}</div>
                    </div>`;
            }).join('');
        } catch(e) {
            console.error("Erro ao carregar lista:", e);
        }
    }

    // --- BLOCO: CHAT ---
    function abrirChat(nome) {
        playSnd('snd-click');
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-title').innerText = nome;
        ultimaQtd = 0;
        carregarMensagens();
        loopChat = setInterval(carregarMensagens, 3000);
    }

    function voltar() {
        playSnd('snd-click');
        clearInterval(loopChat);
        document.getElementById('chat-screen').style.display = 'none';
        document.getElementById('list-screen').style.display = 'flex';
        carregarUsuarios();
    }

    async function carregarMensagens() {
        try {
            const res = await fetch(URL_SCRIPT);
            const msgs = await res.json();
            if(msgs.length !== ultimaQtd) {
                document.getElementById('msgs').innerHTML = msgs.map(m => {
                    const souEu = m.u.toLowerCase() === meuNome;
                    return `
                        <div class="bubble ${souEu ? 'msg-me' : 'msg-others'}">
                            ${m.m}
                            <div class="info-meta">
                                <span>${m.h}</span>
                                ${souEu ? '<span>✓✓</span>' : ''}
                            </div>
                        </div>`;
                }).join('');
                const div = document.getElementById('msgs');
                div.scrollTop = div.scrollHeight;

                if(ultimaQtd > 0 && msgs.length > ultimaQtd) {
                    if(msgs[msgs.length-1].u.toLowerCase() !== meuNome) playSnd('snd-pop');
                }
                ultimaQtd = msgs.length;
            }
        } catch(e){}
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        const txt = input.value.trim();
        if(!txt) return;
        
        playSnd('snd-send');
        fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
            tipo: 'mensagem', usuario: localStorage.getItem('p_user_nome'), msg: txt 
        }) });
        input.value = "";
        // Forçar atualização rápida
        setTimeout(carregarMensagens, 500);
    }

    // --- BLOCO: CADASTRO ---
    function cadastrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(!u || s.length < 4) return alert("Digite um nome e uma senha de 4 dígitos.");
        
        fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
            tipo: 'cadastro', usuario: u, senha: s 
        }) });
        alert("Conta criada com sucesso! Agora você pode entrar.");
    }

    // Enviar mensagem com a tecla ENTER
    document.getElementById('msg-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') enviar();
    });
</script>
</body>
</html>
