<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>A Praça - Premium</title>
    <style>
        /* --- ESTILOS GERAIS --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #fafafa; margin: 0; height: 100svh; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 500px; background: #fff; height: 100%; display: flex; flex-direction: column; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        .header { padding: 15px; border-bottom: 1px solid #dbdbdb; display: flex; align-items: center; justify-content: space-between; font-weight: bold; }
        .screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* --- LOGIN --- */
        #login-screen { padding: 40px 20px; align-items: center; justify-content: center; text-align: center; }
        .input-box { width: 100%; position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #dbdbdb; border-radius: 8px; background: #fafafa; font-size: 16px; }
        .btn-ver { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); border: none; background: none; color: #0095f6; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 8px; background: #0095f6; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* --- LISTA --- */
        .user-card { padding: 15px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; cursor: pointer; transition: 0.2s; }
        .user-card:active { background: #f5f5f5; }
        .avatar { width: 45px; height: 45px; background: #efefef; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #8e8e8e; }

        /* --- CHAT --- */
        #msgs { flex: 1; overflow-y: auto; padding: 15px; background: #fff; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 10px 15px; border-radius: 20px; font-size: 14px; max-width: 80%; line-height: 1.4; }
        .msg-me { align-self: flex-end; background: #3797f0; color: #fff; }
        .msg-others { align-self: flex-start; background: #efefef; color: #262626; }
        .meta { font-size: 9px; opacity: 0.6; margin-top: 4px; text-align: right; }
    </style>
</head>
<body>

<div id="app">
    <div id="login-screen" class="screen">
        <h1 style="letter-spacing: -1px; margin-bottom: 30px;">A Praça</h1>
        <div class="input-box">
            <input type="text" id="user" placeholder="Nome de usuário">
        </div>
        <div class="input-box">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-ver" onclick="togglePass()">VER</button>
        </div>
        <button class="btn-main" onclick="entrar()">Entrar</button>
        <p id="status" style="font-size: 12px; color: #8e8e8e; margin-top: 10px; min-height: 15px;"></p>
        <button onclick="cadastrar()" style="border:none; background:none; color:#0095f6; margin-top:20px;">Criar conta</button>
    </div>

    <div id="list-screen" class="screen" style="display:none">
        <div class="header">
            <span>Conversas</span>
            <button onclick="location.reload()" style="border:none; background:none; color:#ed4956;">Sair</button>
        </div>
        <div id="user-list" style="overflow-y:auto;"></div>
    </div>

    <div id="chat-screen" class="screen" style="display:none">
        <div class="header">
            <button onclick="voltar()" style="border:none; background:none; font-size:25px; cursor:pointer">‹</button>
            <span id="chat-title">Chat</span>
            <div style="width:30px"></div>
        </div>
        <div id="msgs"></div>
        <div style="padding: 10px; display: flex; gap: 10px; border-top: 1px solid #efefef;">
            <input type="text" id="msg-input" placeholder="Mensagem..." style="border-radius:20px; margin:0;">
            <button onclick="enviar()" style="border:none; background:none; color:#0095f6; font-weight:bold;">Enviar</button>
        </div>
    </div>
</div>

<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3"></audio>
<audio id="snd-send" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwZPofaS3kqtw2NIpWLSh_xRR0Ng1wWg7_jc5NAJ7yH7TcWsBEX3UKBzvdw8hou_Fn-WQ/exec"; 
    let meuNome = "";
    let ultimaQtd = 0;
    let chatAtivo = null;

    function playSnd(id) { document.getElementById(id).play().catch(()=>{}); }

    function togglePass() {
        const p = document.getElementById('pass');
        p.type = p.type === "password" ? "text" : "password";
    }

    async function entrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(!u || !s) return;
        
        playSnd('snd-click');
        document.getElementById('status').innerText = "conectando...";

        const res = await fetch(`${URL_SCRIPT}?acao=login&u=${encodeURIComponent(u)}&s=${encodeURIComponent(s)}`);
        if(await res.text() === "ok") {
            meuNome = u.toLowerCase();
            localStorage.setItem('p_user_nome', u);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('list-screen').style.display = 'flex';
            carregarUsuarios();
        } else {
            alert("Login falhou!");
            document.getElementById('status').innerText = "";
        }
    }

    async function carregarUsuarios() {
        const res = await fetch(`${URL_SCRIPT}?acao=get_all_users`);
        const users = await res.json();
        const lista = document.getElementById('user-list');
        lista.innerHTML = users.map(u => {
            if(u.nome.toLowerCase() === meuNome) return '';
            return `
                <div class="user-card" onclick="abrirChat('${u.nome}')">
                    <div class="avatar">${u.nome[0].toUpperCase()}</div>
                    <span>${u.nome}</span>
                </div>`;
        }).join('');
    }

    function abrirChat(nome) {
        playSnd('snd-click');
        chatAtivo = nome;
        document.getElementById('list-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        document.getElementById('chat-title').innerText = nome;
        carregarMensagens();
        window.loopChat = setInterval(carregarMensagens, 3000);
    }

    function voltar() {
        playSnd('snd-click');
        clearInterval(window.loopChat);
        document.getElementById('chat-screen').style.display = 'none';
        document.getElementById('list-screen').style.display = 'flex';
    }

    async function carregarMensagens() {
        const res = await fetch(URL_SCRIPT);
        const msgs = await res.json();
        if(msgs.length !== ultimaQtd) {
            document.getElementById('msgs').innerHTML = msgs.map(m => {
                const souEu = m.u.toLowerCase() === meuNome;
                return `
                    <div class="bubble ${souEu ? 'msg-me' : 'msg-others'}">
                        ${m.m}
                        <div class="meta">${m.h} ${souEu ? '✓✓' : ''}</div>
                    </div>`;
            }).join('');
            document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
            if(ultimaQtd > 0 && msgs.length > ultimaQtd) {
                if(msgs[msgs.length-1].u.toLowerCase() !== meuNome) playSnd('snd-pop');
            }
            ultimaQtd = msgs.length;
        }
    }

    function enviar() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        playSnd('snd-send');
        fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
            tipo: 'mensagem', usuario: meuNome, msg: input.value 
        }) });
        input.value = "";
    }

    function cadastrar() {
        const u = document.getElementById('user').value.trim();
        const s = document.getElementById('pass').value.trim();
        if(!u || s.length < 4) return alert("Dados insuficientes");
        fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipo: 'cadastro', usuario: u, senha: s }) });
        alert("Conta criada!");
    }
</script>
</body>
</html>
